spring.application.name=NailGlow
server.port=8080

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/nailglow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

nailglow.doubao.enabled=${DOUBAO_ENABLED:true}
nailglow.doubao.api-key=${DOUBAO_API_KEY:${LUMIO_API_KEY:${LUMIO_IMAGE_API_KEY:${DEEPSEEK_API_KEY:${AI_API_KEY:${OPENAI_API_KEY:}}}}}}
nailglow.doubao.endpoint=${DOUBAO_IMAGE_ENDPOINT:${LUMIO_IMAGE_ENDPOINT:https://api.lumio.games/}}
nailglow.doubao.model=${DOUBAO_IMAGE_MODEL:${LUMIO_IMAGE_MODEL:gpt-image-2}}
nailglow.doubao.size=${DOUBAO_IMAGE_SIZE:1024x1024}
nailglow.doubao.timeout-seconds=${DOUBAO_IMAGE_TIMEOUT_SECONDS:240}
nailglow.python.bin=${PYTHON_BIN:python}
nailglow.customer-agent.ai-base-url=${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
nailglow.customer-agent.ai-model=${CUSTOMER_AGENT_MODEL:doubao-seed-2-0-pro-260215}
nailglow.customer-agent.timeout-seconds=${CUSTOMER_AGENT_TIMEOUT_SECONDS:90}
nailglow.route-agent.ai-base-url=${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
nailglow.route-agent.ai-model=${ROUTE_AGENT_MODEL:doubao-seed-2-0-pro-260215}
nailglow.route-agent.timeout-seconds=${ROUTE_AGENT_TIMEOUT_SECONDS:35}
nailglow.trend-agent.ai-base-url=${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
nailglow.trend-agent.ai-model=${TREND_AGENT_MODEL:doubao-seed-2-0-pro-260215}
nailglow.trend-agent.timeout-seconds=${TREND_AGENT_TIMEOUT_SECONDS:28}
nailglow.daily-report.ai-base-url=${AI_BASE_URL:https://ark.cn-beijing.volces.com/api/v3}
nailglow.daily-report.ai-model=${DAILY_REPORT_MODEL:doubao-seed-2-0-pro-260215}
nailglow.daily-report.timeout-seconds=${DAILY_REPORT_TIMEOUT_SECONDS:90}
